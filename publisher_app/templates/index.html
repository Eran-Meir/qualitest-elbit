<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RabbitMQ Publisher</title>
    <link href="[https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css](https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css)" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5 text-center" style="max-width: 800px;">
        <h2 class="mb-4 text-primary fw-bold">RabbitMQ Publisher Dashboard</h2>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="alert alert-{{ category }} shadow-sm fw-bold" role="alert">
                {{ message }}
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <div class="row mt-4">
            <div class="col-md-6 mb-4">
                <div class="card shadow-sm h-100 border-0">
                    <div class="card-body d-flex flex-column justify-content-center">
                        <h5 class="card-title fw-bold">Automated Task</h5>
                        <p class="card-text text-muted mb-4">Send 10 default messages.</p>
                        <form action="/publish_default" method="POST">
                            <button type="submit" class="btn btn-primary w-100 py-2 fw-bold shadow-sm">Send Messages</button>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-md-6 mb-4">
                <div class="card shadow-sm h-100 border-0">
                    <div class="card-body d-flex flex-column justify-content-center">
                        <h5 class="card-title fw-bold">Custom Message</h5>
                        <p class="card-text text-muted mb-4">Publish a custom payload.</p>
                        <form action="/publish_custom" method="POST">
                            <div class="input-group shadow-sm">
                                <input type="text" class="form-control" name="custom_message" placeholder="Enter message..." required>
                                <button type="submit" class="btn btn-success fw-bold">Publish</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>

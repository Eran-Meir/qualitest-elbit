<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Monitor</title>
    <style>
        /* 100% Self-Contained CSS - No external libraries needed! */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8f9fa;
            transition: background-color 0.3s ease;
            color: #333;
            margin: 0;
            padding: 40px 20px;
        }
        .container { max-width: 900px; margin: 0 auto; text-align: center; }
        .critical-mode { background-color: #ffcccc !important; }

        #alert-banner {
            display: none;
            background-color: #dc3545;
            color: white;
            padding: 20px;
            border-radius: 10px;
            border: 3px solid #8b0000;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(220, 53, 69, 0.4);
        }
        #alert-banner h1 { margin: 0 0 10px 0; font-size: 2.5em; }
        #alert-banner p { margin: 0; font-size: 1.2em; font-weight: bold; }

        .dashboard-title { color: #0d6efd; margin-bottom: 30px; font-size: 2.2em; }
        .dashboard-title.danger-text { color: #dc3545; }

        .row { display: flex; justify-content: space-between; gap: 20px; }
        .card {
            background: white;
            flex: 1;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .card-header {
            background: #212529;
            color: white;
            padding: 15px;
            font-weight: bold;
            font-size: 1.2em;
        }
        .card-body { padding: 30px; }
        .metric-text { font-size: 4em; font-weight: bold; margin: 0 0 20px 0; }

        /* Custom Progress Bars */
        .progress-track {
            background: #e9ecef;
            border-radius: 20px;
            height: 35px;
            width: 100%;
            overflow: hidden;
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.1);
        }
        .progress-fill {
            height: 100%;
            width: 0%;
            transition: width 0.5s ease, background-color 0.3s ease;
        }

        /* The Colors we were missing! */
        .color-green { background-color: #198754; }
        .color-yellow { background-color: #ffc107; }
        .color-red { background-color: #dc3545; }
        .color-blue { background-color: #0dcaf0; }
    </style>
</head>
<body id="main-body">
    <div class="container">

        <div id="alert-banner">
            <h1>⚠️ CRITICAL CPU ALERT ⚠️</h1>
            <p>System CPU usage has exceeded the 80% threshold!</p>
        </div>

        <h2 class="dashboard-title" id="dashboard-title">Live System Metrics Dashboard</h2>

        <div class="row">
            <div class="card">
                <div class="card-header">CPU Usage (Operating System)</div>
                <div class="card-body">
                    <h1 class="metric-text" id="cpu-text">0%</h1>
                    <div class="progress-track">
                        <div id="cpu-bar" class="progress-fill color-green"></div>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-header">RAM / Memory Usage</div>
                <div class="card-body">
                    <h1 class="metric-text" id="mem-text">0%</h1>
                    <div class="progress-track">
                        <div id="mem-bar" class="progress-fill color-blue"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const CPU_THRESHOLD = 80.0;

        function updateDashboard() {
            fetch('/api/metrics')
                .then(response => response.json())
                .then(data => {
                    const cpu = data.cpu_percent;
                    const mem = data.memory_percent;

                    document.getElementById('cpu-text').innerText = cpu.toFixed(1) + '%';
                    document.getElementById('mem-text').innerText = mem.toFixed(1) + '%';

                    const cpuBar = document.getElementById('cpu-bar');
                    cpuBar.style.width = cpu + '%';
                    const memBar = document.getElementById('mem-bar');
                    memBar.style.width = mem + '%';

                    const body = document.getElementById('main-body');
                    const alertBanner = document.getElementById('alert-banner');
                    const title = document.getElementById('dashboard-title');

                    // The logic perfectly matches your pseudo-code now
                    if (cpu >= CPU_THRESHOLD) {
                        body.classList.add('critical-mode');
                        alertBanner.style.display = 'block';
                        title.classList.add('danger-text');
                        cpuBar.className = 'progress-fill color-red';
                    } else {
                        body.classList.remove('critical-mode');
                        alertBanner.style.display = 'none';
                        title.classList.remove('danger-text');

                        if (cpu >= 60) {
                            cpuBar.className = 'progress-fill color-yellow';
                        } else {
                            cpuBar.className = 'progress-fill color-green';
                        }
                    }
                })
                .catch(err => console.error("Failed to fetch metrics", err));
        }

        setInterval(updateDashboard, 2000);
        updateDashboard();
    </script>
</body>
</html>

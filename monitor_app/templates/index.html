<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Monitor</title>
    <link href="[https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css](https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css)" rel="stylesheet">
    <style>
        body { transition: background-color 0.3s ease; }
        .critical-mode { background-color: #ffcccc !important; }
        #alert-banner { display: none; }
    </style>
</head>
<body class="bg-light" id="main-body">
    <div class="container mt-5 text-center" style="max-width: 900px;">

        <div id="alert-banner" class="alert alert-danger shadow-lg mb-5 border-danger border-3">
            <h1 class="display-4 fw-bold text-danger">⚠️ CRITICAL CPU ALERT ⚠️</h1>
            <p class="lead fw-bold mb-0">System CPU usage has exceeded the 80% threshold!</p>
        </div>

        <h2 class="mb-4 text-primary fw-bold" id="dashboard-title">Live System Metrics Dashboard</h2>

        <div class="row mt-4">
            <div class="col-md-6 mb-4">
                <div class="card shadow-sm h-100 border-0">
                    <div class="card-header bg-dark text-white fw-bold">
                        CPU Usage (Operating System)
                    </div>
                    <div class="card-body d-flex flex-column justify-content-center p-4">
                        <h1 class="display-2 mb-4 fw-bold" id="cpu-text">0%</h1>
                        <div class="progress shadow-sm" style="height: 35px; border-radius: 20px;">
                            <div id="cpu-bar" class="progress-bar progress-bar-striped progress-bar-animated bg-success" role="progressbar" style="width: 0%;"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-md-6 mb-4">
                <div class="card shadow-sm h-100 border-0">
                    <div class="card-header bg-dark text-white fw-bold">
                        RAM / Memory Usage
                    </div>
                    <div class="card-body d-flex flex-column justify-content-center p-4">
                        <h1 class="display-2 mb-4 fw-bold" id="mem-text">0%</h1>
                        <div class="progress shadow-sm" style="height: 35px; border-radius: 20px;">
                            <div id="mem-bar" class="progress-bar progress-bar-striped bg-info" role="progressbar" style="width: 0%;"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const CPU_THRESHOLD = 80.0;
        function updateDashboard() {
            fetch('/api/metrics')
                .then(response => response.json())
                .then(data => {
                    const cpu = data.cpu_percent;
                    const mem = data.memory_percent;

                    document.getElementById('cpu-text').innerText = cpu + '%';
                    document.getElementById('mem-text').innerText = mem + '%';

                    const cpuBar = document.getElementById('cpu-bar');
                    cpuBar.style.width = cpu + '%';
                    const memBar = document.getElementById('mem-bar');
                    memBar.style.width = mem + '%';

                    const body = document.getElementById('main-body');
                    const alertBanner = document.getElementById('alert-banner');
                    const title = document.getElementById('dashboard-title');

                    if (cpu >= CPU_THRESHOLD) {
                        body.classList.add('critical-mode');
                        alertBanner.style.display = 'block';
                        title.classList.replace('text-primary', 'text-danger');
                        cpuBar.classList.replace('bg-success', 'bg-danger');
                        cpuBar.classList.replace('bg-warning', 'bg-danger');
                    } else {
                        body.classList.remove('critical-mode');
                        alertBanner.style.display = 'none';
                        title.classList.replace('text-danger', 'text-primary');
                        if (cpu >= 60) {
                            cpuBar.classList.replace('bg-success', 'bg-warning');
                            cpuBar.classList.replace('bg-danger', 'bg-warning');
                        } else {
                            cpuBar.classList.replace('bg-warning', 'bg-success');
                            cpuBar.classList.replace('bg-danger', 'bg-success');
                        }
                    }
                })
                .catch(err => console.error("Failed to fetch metrics", err));
        }
        setInterval(updateDashboard, 2000);
        updateDashboard();
    </script>
</body>
</html>

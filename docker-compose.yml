version: '3.8'

services:
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq_broker
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: eran
      RABBITMQ_DEFAULT_PASS: likes-elbit-and-qualitest
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 5

  publisher:
    build: ./publisher_app
    container_name: web_publisher
    ports:
      - "5001:5001"
    environment:
      - RABBITMQ_HOST=rabbitmq
      - MQ_USER=eran
      - MQ_PASS=likes-elbit-and-qualitest
      - PYTHONUNBUFFERED=1
    depends_on:
      rabbitmq:
        condition: service_healthy

  consumer:
    build: ./consumer_app
    container_name: web_consumer
    ports:
      - "5002:5002"
    environment:
      - RABBITMQ_HOST=rabbitmq
      - MQ_USER=eran
      - MQ_PASS=likes-elbit-and-qualitest
      - PYTHONUNBUFFERED=1
    depends_on:
      rabbitmq:
        condition: service_healthy

  monitor:
    build: ./monitor_app
    container_name: web_monitor
    pid: "host"                  # CRITICAL: Allows reading host OS CPU/RAM
    ports:
      - "5003:5003"
    environment:
      - PYTHONUNBUFFERED=1